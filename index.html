<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Markdown Table → KaTeX Converter</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 180px; font-family: monospace; font-size: 14px; }
pre { width: 100%; padding: 10px; background: #f7f7f7; border: 1px solid #ccc; white-space: pre; font-family: monospace; font-size: 14px; }
button { padding: 8px 16px; margin-top: 10px; }
</style>
</head>
<body>
<h2>Markdown 表 → KaTeX array 変換</h2>
<textarea id="input" placeholder="ここにMarkdown表を貼り付けてください"></textarea>
<br />
<button id="convertBtn">変換</button>
<button id="copyBtn">コピー</button>
<br /><br />
<pre id="output">変換結果がここに表示されます</pre>
<textarea id="copyBuffer" style="display:none"></textarea>

<script>
function parseMarkdownTable(md) {
    const lines = md.trim().split(/\r?\n/);
    const rows = [];

    for (let line of lines) {
        line = line.trim();
        if (!line.startsWith("|") || !line.endsWith("|")) continue;
        const cells = line.slice(1, -1).split("|").map(c => c.trim());
        rows.push(cells);
    }
    return rows;
}

function convertToKatex(rows) {
    if (rows.length === 0) return "";
    const colCount = rows[0].length;
    const colSpec = Array(colCount).fill("c").join("|");
    let body = rows.map(r => r.join(" & ")).join(" \\\n\\hline\n");
    return `$$\n\\begin{array}{|${colSpec}|}\\hline\n${body} \\\n\\hline\n\\end{array}\n$$`;
}

document.getElementById("convertBtn").onclick = () => {
    const md = document.getElementById("input").value;
    const rows = parseMarkdownTable(md);
    let tex = convertToKatex(rows);
    document.getElementById("output").textContent = tex;
};

document.getElementById("copyBtn").onclick = () => {
    let raw = document.getElementById("output").textContent;
    let escaped = raw.replace(/\\/g, "\\\\");
    const buf = document.getElementById("copyBuffer");
    buf.value = escaped;
    buf.select();
    document.execCommand("copy");
};
</script>
</body>
</html>
