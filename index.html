<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Markdown Table → KaTeX Converter</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 180px; font-family: monospace; font-size: 14px; }
pre { width: 100%; padding: 10px; background: #f7f7f7; border: 1px solid #ccc; white-space: pre; font-family: monospace; font-size: 14px; }
button { padding: 8px 16px; margin-top: 10px; }
</style>
</head>
<body>
<h2>Markdown 表 → KaTeX array 変換</h2>
<textarea id="input" placeholder="ここにMarkdown表を貼り付けてください"></textarea>
<br />
<button id="convertBtn">変換</button>
<button id="copyBtn">コピー</button>
<br /><br />
<pre id="output">変換結果がここに表示されます</pre>
<textarea id="copyBuffer" style="display:none"></textarea>

<script>
function convertTable() {
    const md = document.getElementById("mdInput").value;
    const lines = md.trim().split("\n");

    // 列 spec（|c|c|c|... を作る）
    const colCount = lines[0].split("|").length - 2;
    const colSpec = "c|".repeat(colCount);

    let body = "";
    for (let i = 0; i < lines.length; i++) {
        if (i === 1) continue; // --- 区切り行はスキップ

        const cols = lines[i]
          .split("|")
          .slice(1, -1)
          .map(c => c.trim());

        body += cols.join(" & ") + " \\\\\\\\ \\hline\n";  
        // ^ JS で \\ を出すには \\\\ が必要
    }

    const katex = 
      "$$\\n" +
      "\\\\begin{array}{|" + colSpec + "}\\\\hline\\n" +
      body +
      "\\\\end{array}\\n" +
      "$$";

    // 表示
    document.getElementById("katexOutput").textContent = katex;

    // コピー用
    document.getElementById("copyTarget").value = katex;
}

function copyKatex() {
    navigator.clipboard.writeText(
        document.getElementById("copyTarget").value
    );
}
</script>
</body>
</html>
